<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
    <style>
      
        
        input{
display: block;
width: 300px;
height: 50px;
border-radius: 10px;
background-color: 0,0,0,0.5;
color: rgb(15, 15, 14);
        }
        body{
            width: 100%;
            background: linear-gradient(to right, red, black);
        }
        button{
            text-align: center;
            width: 150px;
            height: 50px;
            background-color: 0,0,0,0.5;
            color: rgb(15, 15, 14);
            border-radius: 10px;
            font-size: x-large;
            
        }
        ::placeholder{
            font-size: larger;
            padding-left: 30px;
            border-radius: 50px;

        }
        .box{
    height: 500px;
    width: 600px;
    
    margin-top: -440px;
    border-radius: 50px;
    margin-left: 50px;
        }
        .box img{
            height: 100%;
            width: 100%;
            border-radius: 50px;

        }

        .main{
            text-align: center;
            width:30%;
            padding-left: 100px;
            margin-left: 50%;
            margin-top: 120px;
            font-size: x-large;
            border-radius: 50px;
            padding-right: 30px;
            
        }
        h1{
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="main">
        <h1>Login Here</h1>
        <form>
            <input type="text" placeholder="Enter Name" required>
            <br>
            <input type="number" placeholder="Enter Age" required>
            <br>
            <input type="email" placeholder="Enter Email" required>
            <br>
            <button>Login</button>
        </form>

    </div>
    <div class="box">
    <img src="https://images.unsplash.com/photo-1643208589889-0735ad7218f0?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTl8fG5ldGZsaXh8ZW58MHx8MHx8&w=1000&q=80" alt="">
</div>
</body>
</html>
