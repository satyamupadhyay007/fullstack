<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal portfolio</title>
    <style>
        *{
            margin:0px;
            padding:0px;
        }
        .main{
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: cornflowerblue;
        }
.sub1{
    position: absolute;
    top: 10vh;

    height: 80vh;
    background-color: turquoise;
     border-radius: 80px 20px 80px 20px;
}
.sub2{
    position: absolute;
    top: 20vh;
    left: 19vw;
    width: 30vw;
    height: 50vh;
    background-color: rgb(113, 42, 193);
    font-size: larger;
   
    text-align: center;
    justify-content: center;
    color: aliceblue;
    border-radius: 80px 20px 80px 20px;
}   
.sub3{
    
    position: absolute;
    top: 30vh;
    right: 21vw;
    width: 30vw;
    height: 50vh;
    background-color: rgb(113, 42, 193);

} 
.sub3 img{
    width: 95%;
    height: 90%;
    border:solid rgb(16, 16, 16) 5px;

}
.sub2 button{

    height: 50px;
    background-color: rgb(14, 14, 14);

    border-radius: 20px 5px 20px 5px;
    color: aquamarine;

}
span{
    color: blue;
}
.sub4{
    display: none;
    position: absolute;
    top: 30vh;
    right: 20vw;
    width: 30vw;
    height: 50vh;
    background-color: rgb(113, 42, 193);

} 
.sub4 img{

    height: 90px;
    border:solid aliceblue 3px;
    border-radius: 80px 20px 80px 20px;
    margin-left: 5%;
}

</head>
<body>
    <div class="main">
        <div class="sub1">

        </div>
<div class="sub2">
    <br> <br> <br>
<h1 id="head1">Satyam Upadhyay</h1>

<div class="sub4">
    <img src=" " alt="">
</div>

<script>
function changecontent(){
    document.getElementById("head1").innerHTML = "Fresher";

document.getElementsByClassName("sub3").style.display= "none";

}
